<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
   <div id="result">

   </div>

   <script>
    let n = 6;
let output = "";

for (let i = 1; i <= n; i++) {
  let spaces = "&nbsp;".repeat(n - i);
  let stars = "*".repeat(2 * i - 1);
  output += spaces + stars + "<br>";
}

document.body.innerHTML = output;
   </script>
</body>
</html>
